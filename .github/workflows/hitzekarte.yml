name: NRW Hitzekarte täglich

on:
  schedule:
    # Täglich 08:15 UTC = 09:15 MEZ / 10:15 MESZ
    - cron: "15 8 * * *"
  workflow_dispatch:   # manuell auslösbar

permissions:
  contents: write      # für den Commit zurück ins Repo

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── Repo auschecken ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python + Abhängigkeiten ────────────────────────────────────────────
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: pip install --quiet -r requirements.txt

      # ── Karte generieren ──────────────────────────────────────────────────
      - name: Hitzekarte generieren
        run: python generate_map.py

      # ── Ergebnis committen ────────────────────────────────────────────────
      - name: Karte committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Hitzekarte_NRW_heute.jpg
          # Nur committen wenn sich etwas geändert hat
          git diff --cached --quiet || \
            git commit -m "Auto: Hitzekarte $(date +'%Y-%m-%d')"
          git push
